name: Test Auth with GoodbyeDPI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            git \
            make \
            gcc \
            libpcap-dev
      
      - name: Setup GoodbyeDPI
        run: |
          chmod +x ./setup_nodpi.sh
          ./setup_nodpi.sh
      
      - name: Run GoodbyeDPI in background
        run: |
          cd /tmp/NoDPI
          # Запускаем с параметрами для обхода блокировок
          sudo ./goodbyedpi -9 --dns-addr 8.8.8.8 --dns-port 53 &
          echo "✅ GoodbyeDPI запущен в фоне"
          sleep 5
          # Проверяем что процесс запущен
          ps aux | grep goodbyedpi
      
      - name: Install Python dependencies
        run: |
          pip install selenium
      
      - name: Create screenshots dir
        run: mkdir -p screenshots
      
      - name: Test connection without proxy
        run: |
          echo "Проверяем доступ к сайту..."
          curl -I https://9111.ru || echo "Сайт недоступен"
      
      - name: Run test
        env:
          NINTH_EMAIL: ${{ secrets.NINTH_EMAIL }}
          NINTH_PASSWORD: ${{ secrets.NINTH_PASSWORD }}
        run: python src/poster.py
      
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
      
      - name: Cleanup
        if: always()
        run: |
          sudo pkill goodbyedpi || true
