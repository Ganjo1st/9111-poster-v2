name: Публикация из Telegram на 9111

on:
  workflow_dispatch:  # Ручной запуск
  schedule:
    - cron: '*/30 * * * *'  # Каждые 30 минут

jobs:
  test:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Установка Chrome и обход блокировок
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable iptables
        google-chrome --version
        
    - name: Настройка обхода блокировок (zapret)
      run: |
        chmod +x ./setup_zapret.sh
        sudo ./setup_zapret.sh
        
    - name: Установка зависимостей
      run: |
        pip install selenium webdriver-manager python-dotenv telethon
        
    - name: Создание папки для скриншотов
      run: mkdir -p screenshots
        
    - name: Запуск публикации
      env:
        USER_HASH: ${{ secrets.USER_HASH }}
        UKK: ${{ secrets.UKK }}
        NINTH_EMAIL: ${{ secrets.NINTH_EMAIL }}
        NINTH_PASSWORD: ${{ secrets.NINTH_PASSWORD }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      run: |
        # Важно! Добавляем текущую директорию в PYTHONPATH
        export PYTHONPATH="${PYTHONPATH}:${PWD}"
        python -m src.poster
        
    - name: Сохранение скриншотов
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/*.png
        if-no-files-found: warn
        
    - name: Очистка
      if: always()
      run: |
        sudo pkill nfqws || true
        sudo rm -f /root/fake_tls.bin
