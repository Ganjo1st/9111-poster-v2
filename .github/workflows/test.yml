name: Test Auth with zapret

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            git \
            make \
            gcc \
            autoconf \
            libtool \
            libnetfilter-queue-dev \
            libnfnetlink-dev \
            libmnl-dev \
            libcap-dev
      
      - name: Setup zapret
        run: |
          chmod +x ./setup_zapret.sh
          sudo ./setup_zapret.sh
      
      - name: Run zapret in aggressive mode
        run: |
          # Запускаем с самыми агрессивными настройками для обхода блокировок
          sudo /usr/local/bin/tpws --port=989 --bind-addr=127.0.0.1 --split-http --split-tls --disorder --oob --daemon
          echo "✅ zapret запущен"
          sleep 3
          ps aux | grep tpws
      
      - name: Test connection
        run: |
          echo "Проверяем доступ к сайту..."
          curl -I https://9111.ru || echo "Сайт недоступен напрямую"
          
          # Проверяем через tpws (работает как прокси)
          echo "Проверяем через tpws прокси..."
          curl -I https://9111.ru --proxy 127.0.0.1:989 || echo "Через прокси тоже не работает"
      
      - name: Install Python dependencies
        run: |
          pip install selenium
      
      - name: Create screenshots dir
        run: mkdir -p screenshots
      
      - name: Run test
        env:
          NINTH_EMAIL: ${{ secrets.NINTH_EMAIL }}
          NINTH_PASSWORD: ${{ secrets.NINTH_PASSWORD }}
          http_proxy: http://127.0.0.1:989
          https_proxy: http://127.0.0.1:989
        run: |
          # Chrome не всегда уважает переменные окружения, поэтому настроим явно
          python src/poster.py
      
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
      
      - name: Cleanup
        if: always()
        run: |
          sudo pkill tpws || true
