name: Test Auth with NoDPI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            git \
            python3 \
            python3-pip
      
      - name: Setup NoDPI
        run: |
          chmod +x ./setup_nodpi.sh
          ./setup_nodpi.sh
      
      - name: Run NoDPI in background
        run: |
          cd /tmp/NoDPI
          # Запускаем NoDPI с черным списком
          python3 nodpi.py --blacklist ${{ github.workspace }}/blacklist.txt &
          echo "✅ NoDPI запущен в фоне"
          sleep 3
          # Проверяем что процесс запущен
          ps aux | grep nodpi
      
      - name: Install Python dependencies
        run: |
          pip install selenium
      
      - name: Create screenshots dir
        run: mkdir -p screenshots
      
      - name: Configure system to use NoDPI proxy
        run: |
          # Настраиваем системный прокси для HTTP/HTTPS
          echo "export http_proxy=http://127.0.0.1:8881" >> ~/.bashrc
          echo "export https_proxy=http://127.0.0.1:8881" >> ~/.bashrc
          source ~/.bashrc
          
          # Альтернативно, настраиваем через environment для текущего шага
          echo "http_proxy=http://127.0.0.1:8881" >> $GITHUB_ENV
          echo "https_proxy=http://127.0.0.1:8881" >> $GITHUB_ENV
          echo "✅ Прокси настроен"
      
      - name: Run test
        env:
          NINTH_EMAIL: ${{ secrets.NINTH_EMAIL }}
          NINTH_PASSWORD: ${{ secrets.NINTH_PASSWORD }}
          http_proxy: http://127.0.0.1:8881
          https_proxy: http://127.0.0.1:8881
        run: |
          # Проверяем что прокси работает
          curl -I https://9111.ru --proxy http://127.0.0.1:8881 || true
          # Запускаем тест
          python src/poster.py
      
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
      
      - name: Cleanup
        if: always()
        run: |
          pkill -f nodpi.py || true
