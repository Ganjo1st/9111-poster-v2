name: Test Auth with DPI Bypass

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install ALL system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            git \
            make \
            gcc \
            libnetfilter-queue-dev \
            libnfnetlink-dev \
            libmnl-dev \
            autoconf \
            libtool \
            pkg-config \
            libcap-dev \
            libssl-dev
      
      - name: Setup zapret (DPI bypass)
        run: |
          chmod +x ./setup_zapret.sh
          sudo ./setup_zapret.sh
      
      - name: Run zapret in background
        run: |
          sudo /usr/local/bin/tpws --port=989 --bind-addr=127.0.0.1 --daemon
          echo "✅ zapret запущен в фоне"
          sleep 3
      
      - name: Install Python dependencies
        run: |
          pip install selenium
      
      - name: Create screenshots dir
        run: mkdir -p screenshots
      
      - name: Run test
        env:
          NINTH_EMAIL: ${{ secrets.NINTH_EMAIL }}
          NINTH_PASSWORD: ${{ secrets.NINTH_PASSWORD }}
        run: python src/poster.py
      
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
      
      - name: Stop zapret (cleanup)
        if: always()
        run: sudo pkill tpws || true
