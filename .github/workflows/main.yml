name: Post to 9111

on:
  schedule:
    - cron: '*/30 * * * *'  # Каждые 30 минут
  workflow_dispatch:  # Ручной запуск

jobs:
  post-to-9111:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable curl bc
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download and test proxy
      run: |
        echo "📥 Скачиваем список российских прокси..."
        # Скачиваем список прокси
        curl -s -o russian_proxies.txt https://raw.githubusercontent.com/ClearProxy/checked-proxy-list/main/http/raw/country/RU.txt
        
        # Функция для проверки прокси
        check_proxy() {
          local proxy=$1
          echo "🔄 Проверяем прокси: $proxy"
          
          # Проверяем базовую доступность
          if curl -x "http://$proxy" -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://example.com | grep -q "200"; then
            # Проверяем HTTPS
            if curl -x "http://$proxy" -s -o /dev/null -w "%{http_code}" --max-time 5 https://google.com | grep -q "200"; then
              # Проверяем скорость
              SPEED=$(curl -x "http://$proxy" -s -o /dev/null -w "%{time_total}" --max-time 5 https://google.com)
              if (( $(echo "$SPEED < 3" | bc -l) )); then
                echo "✅ Прокси работает быстро: $SPEED сек"
                return 0
              fi
            fi
          fi
          return 1
        }
        
        # Пробуем найти рабочий прокси
        WORKING_PROXY=""
        MAX_ATTEMPTS=20
        
        echo "🔍 Ищем рабочий прокси (максимум $MAX_ATTEMPTS попыток)..."
        
        for i in $(seq 1 $MAX_ATTEMPTS); do
          TOTAL=$(wc -l < russian_proxies.txt)
          if [ $TOTAL -eq 0 ]; then
            echo "❌ Список прокси пуст"
            exit 1
          fi
          
          # Выбираем случайный прокси
          RANDOM_LINE=$((1 + RANDOM % $TOTAL))
          PROXY=$(sed -n "${RANDOM_LINE}p" russian_proxies.txt | tr -d '\r')
          
          echo "Попытка $i: проверяем $PROXY"
          
          if check_proxy "$PROXY"; then
            WORKING_PROXY="$PROXY"
            echo "✅ Найден рабочий прокси: $WORKING_PROXY"
            break
          fi
          
          # Удаляем нерабочий прокси из списка
          sed -i "${RANDOM_LINE}d" russian_proxies.txt
          
          sleep 1
        done
        
        if [ -z "$WORKING_PROXY" ]; then
          echo "❌ Не удалось найти рабочий прокси после $MAX_ATTEMPTS попыток"
          echo "🔄 Пробуем запустить без прокси..."
          echo "USE_PROXY=false" >> $GITHUB_ENV
        else
          echo "✅ Выбран прокси: $WORKING_PROXY"
          echo "PROXY=$WORKING_PROXY" >> $GITHUB_ENV
          echo "USE_PROXY=true" >> $GITHUB_ENV
          
          # Дополнительная проверка для Chrome
          echo "🔄 Проверяем доступ к Chrome API через прокси..."
          if curl -x "http://$WORKING_PROXY" -s -o /dev/null -w "%{http_code}" --max-time 10 https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json | grep -q "200"; then
            echo "✅ Chrome API доступен"
          else
            echo "⚠️ Chrome API недоступен через прокси, запускаем без прокси"
            echo "USE_PROXY=false" >> $GITHUB_ENV
          fi
        fi
    
    - name: Run poster
      env:
        NINTH_EMAIL: ${{ secrets.NINTH_EMAIL }}
        NINTH_PASSWORD: ${{ secrets.NINTH_PASSWORD }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        USER_HASH: ${{ secrets.USER_HASH }}
        UUK: ${{ secrets.UUK }}
        PROXY: ${{ env.PROXY }}
        USE_PROXY: ${{ env.USE_PROXY }}
      run: |
        mkdir -p logs
        
        if [ "$USE_PROXY" = "true" ] && [ -n "$PROXY" ]; then
          echo "🚀 Запуск с прокси: $PROXY"
          export HTTP_PROXY="http://$PROXY"
          export HTTPS_PROXY="http://$PROXY"
        else
          echo "🚀 Запуск без прокси"
          unset HTTP_PROXY
          unset HTTPS_PROXY
        fi
        
        python main_github.py || {
          EXIT_CODE=$?
          echo "⚠️ Скрипт завершился с кодом $EXIT_CODE"
          
          # Если ошибка с прокси, пробуем без прокси
          if [ "$USE_PROXY" = "true" ] && [ $EXIT_CODE -ne 0 ]; then
            echo "🔄 Пробуем перезапустить без прокси..."
            unset HTTP_PROXY
            unset HTTPS_PROXY
            python main_github.py
          fi
        }
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: logs/
        if-no-files-found: ignore
