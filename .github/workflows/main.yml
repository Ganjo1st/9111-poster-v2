name: 9111 Poster

on:
  schedule:
    # Запуск каждый день в 10:00 и 18:00 по Москве (UTC+3)
    - cron: '0 7 * * *'   # 10:00 МСК
    - cron: '0 15 * * *'  # 18:00 МСК
  workflow_dispatch:  # Возможность ручного запуска

jobs:
  post-to-9111:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Get fresh Russian proxies
      run: |
        echo "📥 Скачиваем список российских прокси..."
        # Скачиваем список HTTP прокси из России
        curl -s -o russian_proxies.txt https://raw.githubusercontent.com/ClearProxy/checked-proxy-list/main/http/raw/country/RU.txt
        
        # Показываем первые 5 прокси для отладки
        echo "🔄 Первые 5 прокси из списка:"
        head -5 russian_proxies.txt | while read proxy; do
          echo "   $proxy"
        done
        
        # Берём случайный прокси из списка
        TOTAL=$(wc -l < russian_proxies.txt)
        if [ $TOTAL -gt 0 ]; then
          RANDOM_LINE=$((1 + RANDOM % $TOTAL))
          PROXY=$(sed -n "${RANDOM_LINE}p" russian_proxies.txt)
          echo "✅ Выбран прокси: $PROXY"
          echo "PROXY=$PROXY" >> $GITHUB_ENV
        else
          echo "❌ Не удалось получить список прокси"
          exit 1
        fi
        
    - name: Create logs directory
      run: mkdir -p logs
      
    - name: Run 9111 poster with proxy
      env:
        NINTH_EMAIL: ${{ secrets.NINTH_EMAIL }}
        NINTH_PASSWORD: ${{ secrets.NINTH_PASSWORD }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        USER_HASH: ${{ secrets.USER_HASH }}
        UUK: ${{ secrets.UUK }}
        HTTP_PROXY: http://${{ env.PROXY }}
        HTTPS_PROXY: http://${{ env.PROXY }}
      run: python main_github.py
      
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: logs/
